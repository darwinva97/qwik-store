name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
        env:
          VITE_WOO_URL: ${{ secrets.VITE_WOO_URL }}
          VITE_WOO_CONSUMER_KEY: ${{ secrets.VITE_WOO_CONSUMER_KEY }}
          VITE_WOO_CONSUMER_SECRET: ${{ secrets.VITE_WOO_CONSUMER_SECRET }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=qwik-store --branch=main
